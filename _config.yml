plugins:
  - jekyll-relative-links
  
#  - jekyll-remote-theme 
#remote_theme: cotes2020/jekyll-theme-chirpy

relative_links:
  enabled: true
  collections: false
  
include:
  - _config.yml
  - README.md
  - LICENSE.md

markdown: GFM
show_downloads: false
title: "Before you prompt"

theme: jekyll-theme-architect
# jekyll-theme-cayman

# 👈 GET RID OF THE RIGHT PANEL GLOBALLY
defaults:
  - scope:
      path: ""
    values:
      layout: page
      hidetoc: true
