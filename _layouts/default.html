<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <!--link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
    :root { --bg: #f8fafc; --text: #0f172a; --link: #0284c7; --accent: #e2e8f0; }
    @media (prefers-color-scheme: dark) { :root { --bg: #0f172a; --text: #f8fafc; --link: #38bdf8; --accent: #1e293b; } }
    body { font-family: system-ui, sans-serif; line-height: 1.6; max-width: 700px; margin: 0 auto; padding: 2rem 1.2rem; background: var(--bg); color: var(--text); }
    nav { padding-bottom: 1.5rem; border-bottom: 1px solid var(--accent); margin-bottom: 2rem; }
    nav a { text-decoration: none; color: var(--link); font-weight: 600; font-size: 0.95rem; }
    h1, h2, h3 { line-height: 1.25; color: var(--text); margin-top: 2rem; }
    a { color: var(--link); }
    code { background: var(--accent); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85em; font-family: monospace; }
    pre { background: var(--accent); padding: 1rem; border-radius: 8px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
  </style>
  </head>
  <body>

    <header class="page-header" role="banner">
      <h1 class="project-name">{{ site.title | default: site.github.repository_name }}</h1>
      <h2 class="project-tagline">{{ site.description | default: site.github.project_tagline }}</h2>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        {% if site.github.is_project_page %}
          <span class="site-footer-owner"><a href="{{ site.github.repository_url }}">{{ site.github.repository_name }}</a> is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>.</span>
        {% endif %}
        <span class="site-footer-credits">This page was generated by <a href="https://github.com">GitHub Pages</a>.</span>
      </footer>
    </main>

    <!-- 🏠 HOME BUTTON BANNER -->
    <nav>
      <a href="{{ '/' | relative_url }}">🏠 Home</a>
    </nav>

    
  </body>
</html>
